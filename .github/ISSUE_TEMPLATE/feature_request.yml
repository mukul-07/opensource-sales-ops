name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the [Code of Conduct](https://github.com/mukul-07/opensource-sales-ops/blob/main/CODE_OF_CONDUCT.md)
          required: true
  - type: checkboxes
    id: search
    attributes:
      label: Existing issues
      options:
        - label: I searched existing issues and this hasn't been requested yet
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why do you need this?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Qualification / Scoring
        - Outreach Drafting
        - Scanner / Lead Sources
        - Cadence / Follow-ups
        - Pattern Analysis
        - Batch Processing
        - CRM Integration
        - Lead Enrichment
        - Documentation
        - Other
    validations:
      required: true
